name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  # Vercel handles deployment automatically on push to main
  # This job just validates the build would succeed
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: typecheck-and-lint

    env:
      # Dummy values for build check only
      DATABASE_URL: "postgresql://dummy:dummy@dummy.neon.tech/dummy"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_dummy"
      CLERK_SECRET_KEY: "sk_test_dummy"
      ANTHROPIC_API_KEY: "sk-ant-dummy"
      R2_ACCOUNT_ID: "dummy"
      R2_ACCESS_KEY_ID: "dummy"
      R2_SECRET_ACCESS_KEY: "dummy"
      R2_BUCKET_NAME: "dummy"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_NAME: "PFOS"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
